[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "markitdown-web"
version = "0.1.0"
description = "Web interface for Microsoft MarkItDown"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.28.0",
    "python-multipart>=0.0.9",
    "markitdown",
]

[tool.hatch.build.targets.sdist]
only-include = ["src/markitdown_web"]
